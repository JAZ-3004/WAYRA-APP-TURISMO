<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Wayra: Fiestas de Nariño</title>

    <!-- PWA: manifest con ruta absoluta -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1c0900" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wayra" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- SEO / descripción -->
    <meta name="description" content="Explora las fiestas tradicionales de los 64 municipios de Nariño." />

    <!-- Open Graph -->
    <meta property="og:title" content="Wayra: Fiestas de Nariño" />
    <meta property="og:description" content="Explora las fiestas tradicionales de los 64 municipios de Nariño." />
    <meta property="og:type" content="website" />

    <!-- Fondo oscuro inmediato para que no parpadee blanco antes del splash -->
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        background: #1c0900;
        min-height: 100dvh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;background:#1c0900;color:#fbbf24;flex-direction:column;gap:12px">
        <img src="/icon-192.png" style="width:72px;border-radius:16px" alt="Wayra"/>
        <strong>Wayra necesita JavaScript para funcionar.</strong>
        <span style="font-size:0.85rem">Por favor activa JavaScript en tu navegador.</span>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
